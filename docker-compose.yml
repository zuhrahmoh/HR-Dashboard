services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-dashboard-postgres
    environment:
      POSTGRES_DB: hr_dashboard
      POSTGRES_USER: hr_dashboard
      POSTGRES_PASSWORD: hr_dashboard
    ports:
      - "5432:5432"
    volumes:
      - hr_dashboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_dashboard -d hr_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hr_dashboard_pgdata:
